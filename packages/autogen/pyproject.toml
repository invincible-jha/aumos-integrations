[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "autogen-aumos"
version = "0.1.0"
description = "AumOS governance integration for Microsoft AutoGen conversations"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [
  { name = "MuVeraAI Corporation", email = "oss@muverai.com" },
]
keywords = ["autogen", "aumos", "governance", "agents", "ai-safety", "multi-agent"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
  "aumos-governance>=0.1.0",
]

[project.optional-dependencies]
autogen = ["pyautogen>=0.2"]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "ruff>=0.3",
  "mypy>=1.9",
]

[project.urls]
Homepage = "https://github.com/aumos-ai/aumos-integrations"
Repository = "https://github.com/aumos-ai/aumos-integrations"
Documentation = "https://docs.aumos.ai/integrations/autogen"
"Bug Tracker" = "https://github.com/aumos-ai/aumos-integrations/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/autogen_aumos"]

[tool.ruff]
src = ["src"]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "ANN", "S", "B", "A", "COM", "C4", "RET", "SIM", "TCH"]
ignore = ["ANN101", "ANN102", "COM812"]

[tool.mypy]
strict = true
python_version = "3.10"
files = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
